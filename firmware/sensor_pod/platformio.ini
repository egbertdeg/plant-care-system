[env:adafruit_feather_esp32s3]
platform = espressif32
board = adafruit_feather_esp32s3
framework = arduino
monitor_speed = 115200
upload_port = COM5   ; Bootloader mode (BOOT+RESET) — board enumerates here
monitor_port = COM4  ; Normal run mode

lib_deps =
    adafruit/Adafruit seesaw Library    ; Soil moisture sensors (STEMMA 4026)
    adafruit/Adafruit SHT4x Library    ; Temperature & humidity (SHT40)
    adafruit/Adafruit TSL2591 Library  ; Light sensor (TSL2591)
    adafruit/Adafruit SSD1306          ; OLED display (128x64)
    adafruit/Adafruit GFX Library      ; Required by SSD1306
    adafruit/Adafruit BusIO            ; Required by Adafruit sensor libs
    knolleary/PubSubClient             ; MQTT client
    bblanchon/ArduinoJson              ; JSON message formatting

upload_flags =
    --before=no_reset
    --after=hard_reset

build_flags =
    -DCORE_DEBUG_LEVEL=3               ; Enable verbose debug output

[env:adafruit_feather_esp32s3_ota]
platform = espressif32
board = adafruit_feather_esp32s3
framework = arduino
monitor_speed = 115200
monitor_port = COM4
upload_protocol = espota
upload_port = 192.168.1.207           ; device IP (mDNS: sensor_pod_001.local)

lib_deps =
    adafruit/Adafruit seesaw Library
    adafruit/Adafruit SHT4x Library
    adafruit/Adafruit TSL2591 Library
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library
    adafruit/Adafruit BusIO
    knolleary/PubSubClient
    bblanchon/ArduinoJson

build_flags =
    -DCORE_DEBUG_LEVEL=3
