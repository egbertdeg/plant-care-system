[env:adafruit_feather_esp32s3]
platform = espressif32
board = adafruit_feather_esp32s3
framework = arduino
monitor_speed = 115200
upload_port = COM7     ; bootloader mode (BOOT+RESET → check Device Manager)
monitor_port = COM6    ; normal run mode

lib_deps =
    adafruit/Adafruit LSM6DS           ; IMU (LSM6DS3 tilt detection)
    adafruit/Adafruit MPRLS Library    ; Pressure sensor (water volume) — not installed yet
    adafruit/Adafruit SSD1306          ; OLED display (128×32) — not installed yet
    adafruit/Adafruit GFX Library      ; Required by SSD1306
    adafruit/Adafruit BusIO            ; Required by Adafruit sensor libs
    adafruit/Adafruit MAX1704X         ; Battery fuel gauge (MAX17048) — on-board I2C chip
    knolleary/PubSubClient             ; MQTT client
    bblanchon/ArduinoJson              ; JSON message formatting

upload_flags =
    --before=no_reset
    --after=hard_reset

build_flags =
    -DCORE_DEBUG_LEVEL=3               ; Enable verbose debug output

[env:adafruit_feather_esp32s3_ota]
platform = espressif32
board = adafruit_feather_esp32s3
framework = arduino
monitor_speed = 115200
monitor_port = COM6
upload_protocol = espota
upload_port = 192.168.1.113  ; watering_can_001 — MAC b8:f8:62:d5:bc:6c  TTL=64 confirmed ESP32

lib_deps =
    adafruit/Adafruit LSM6DS
    adafruit/Adafruit MPRLS Library
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library
    adafruit/Adafruit BusIO
    adafruit/Adafruit MAX1704X
    knolleary/PubSubClient
    bblanchon/ArduinoJson

build_flags =
    -DCORE_DEBUG_LEVEL=3
